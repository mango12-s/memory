<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>걸그룹 아이돌 순위 랭킹</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>K-POP 걸그룹 멤버 순위 랭킹</h1>
        <p>최신 인기 멤버 10인</p>
    </header>
    <main class="ranking-container">
        <!-- 여기에 멤버 목록이 동적으로 삽입될 예정입니다. -->
        
        <!-- 예시 항목 (실제 데이터로 대체 필요) -->
        <div class="member-card">
            <div class="member-info">
                <h2>1위: 멤버 A</h2>
                <p class="rank">Rank 1</p>
            </div>
            <div class="member-image-container">
                <!-- 사용자가 Pinterest 등에서 가져온 사진을 여기에 삽입하세요 -->
                <img src="placeholder_image_a.jpg" alt="멤버 A 사진">
            </div>
        </div>
        
        <div class="member-card">
            <div class="member-info">
                <h2>2위: 멤버 B</h2>
                <p class="rank">Rank 2</p>
            </div>
            <div class="member-image-container">
                <img src="placeholder_image_b.jpg" alt="멤버 B 사진">
            </div>
        </div>
        
        <!-- 나머지 8개 항목을 여기에 추가하세요 -->
        
    </main>
</body>
</html>
